services:
  # ── PostgreSQL with PostGIS ────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: schooltruth_postgres
    environment:
      POSTGRES_DB: schooltruth
      POSTGRES_USER: schooltruth
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-schooltruth}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schooltruth"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis (SSE + job queue) ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: schooltruth_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: schooltruth_backend
    environment:
      DATABASE_URL: postgresql://schooltruth:${POSTGRES_PASSWORD:-schooltruth}@postgres:5432/schooltruth
      REDIS_URL: redis://redis:6379
      GOOGLE_EARTH_ENGINE_KEY: ${GOOGLE_EARTH_ENGINE_KEY:-}
      GEE_SERVICE_ACCOUNT_EMAIL: ${GEE_SERVICE_ACCOUNT_EMAIL:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER:-whatsapp:+14155238886}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-schooltruth-change-in-production-use-strong-secret}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:80}
      FROM_EMAIL: ${FROM_EMAIL:-notices@schooltruth.in}
    volumes:
      - ./backend:/app
      - notices_storage:/tmp/notices
      - mdm_cache:/tmp/mdm_cache
      - board_cache:/tmp/board_results_cache
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        cd /app &&
        pip install -r requirements.txt -q &&
        python -c 'from app.database import init_db; init_db()' &&
        python data/processing/anomaly_scorer.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: schooltruth_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: schooltruth_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  notices_storage:
  mdm_cache:
  board_cache:
  nginx_certs:
